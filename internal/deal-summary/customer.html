<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Flipdish cost justification</title>
<meta name="robots" content="noindex, nofollow">

<!-- Password gate (the rep is the one opening this; the page reads from the rep's browser) -->
<script src="../auth.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --flipdish-blue: #0074D9;
    --flipdish-blue-dark: #064885;
    --flipdish-blue-light: #E6F1FB;
    --flipdish-blue-line: #BEDAF2;
    --flipdish-dark: #1A1A1A;
    --muted: #6B7280;
    --bg: #F6F9FC;
    --card: #FFFFFF;
    --border: #E5E7EB;
    --green-strong: #2E8B57;
    --green-soft: #E6F4EC;
    --green-border: #9DCDB1;
    --amber-strong: #B8860B;
    --amber-soft: #FFF6D6;
    --amber-border: #E6CD66;
    --red-strong: #C0392B;
    --red-soft: #FBE9E7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--flipdish-dark);
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 { font-family: 'Domine', Georgia, serif; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .brand { display: flex; align-items: center; gap: 12px; }
  .topbar .brand svg { height: 30px; width: auto; display: block; }
  .topbar .date-stamp { font-size: 13px; color: var(--muted); }

  .wrap { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  /* ---------- Header ---------- */
  .doc-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--flipdish-blue-line);
  }
  .doc-kicker {
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--flipdish-blue);
    margin-bottom: 10px;
  }
  .doc-title {
    font-size: 34px; font-weight: 700;
    color: var(--flipdish-blue-dark); line-height: 1.15;
    margin: 0 0 8px; letter-spacing: -0.01em;
  }
  .doc-subtitle {
    font-size: 16px; color: var(--muted); margin: 0;
  }
  .doc-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    margin-top: 14px; font-size: 13px; color: var(--muted);
  }
  .doc-meta .meta-item { display: inline-flex; align-items: center; gap: 6px; }
  .doc-meta .meta-item strong { color: var(--flipdish-dark); }

  /* ---------- Value hero ---------- */
  .hero {
    background: linear-gradient(135deg, #E6F4EC 0%, #C9E5D5 100%);
    border: 1px solid var(--green-border);
    border-radius: 16px;
    padding: 32px 36px;
    margin: 0 0 24px;
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
  }
  .hero.no-value {
    background: linear-gradient(135deg, #FFF6D6 0%, #F5E5A1 100%);
    border-color: var(--amber-border);
  }
  .hero .cell .label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #1B5C36; margin-bottom: 4px;
  }
  .hero.no-value .cell .label { color: #6B5500; }
  .hero .cell .big {
    font-family: 'Domine', Georgia, serif;
    font-size: 38px; font-weight: 700;
    color: #1B5C36; line-height: 1.1; letter-spacing: -0.02em;
    margin: 2px 0 6px;
  }
  .hero.no-value .cell .big { color: #6B5500; }
  .hero .cell .sub {
    font-size: 12px; color: #1B5C36; opacity: 0.82;
  }
  .hero.no-value .cell .sub { color: #6B5500; }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; gap: 18px; } }

  /* ---------- Section heading ---------- */
  .section-title {
    font-size: 20px; font-weight: 600;
    color: var(--flipdish-blue-dark);
    margin: 32px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .dot {
    width: 10px; height: 10px; border-radius: 999px;
    background: var(--flipdish-blue); flex: 0 0 auto;
  }

  /* ---------- Comparison tiles (today vs with Flipdish) ---------- */
  .compare-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    margin-bottom: 18px;
  }
  @media (max-width: 760px) { .compare-grid { grid-template-columns: 1fr; } }

  .compare {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 22px;
  }
  .compare .compare-title {
    font-family: 'Domine', Georgia, serif;
    font-size: 15px; font-weight: 600;
    color: var(--flipdish-blue-dark);
    margin: 0 0 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .compare .row {
    display: flex; justify-content: space-between;
    padding: 6px 0; font-size: 14px;
  }
  .compare .row .k { color: var(--muted); }
  .compare .row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .compare .total-row {
    display: flex; justify-content: space-between;
    padding: 12px 0 0; margin-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 15px; font-weight: 600;
  }
  .compare .total-row .v { color: var(--flipdish-blue-dark); }

  .save-callout {
    display: inline-block;
    font-size: 13px; font-weight: 700;
    padding: 6px 12px; border-radius: 999px;
    background: var(--green-soft); color: var(--green-strong);
    margin-top: 12px;
  }
  .save-callout.negative { background: var(--red-soft); color: var(--red-strong); }
  .save-callout.zero { background: #F0F4F8; color: var(--muted); }

  /* ---------- Discount stack (hyped pricing tiles) ---------- */
  .discount-stack {
    background: linear-gradient(135deg, #FFF6D6 0%, #FFE9A8 100%);
    border: 1px solid var(--amber-border);
    border-radius: 16px;
    padding: 22px 26px;
    margin-bottom: 20px;
  }
  .discount-stack-intro {
    font-size: 14px;
    color: #6B5500;
    margin: 0 0 14px;
    line-height: 1.5;
  }
  .discount-stack-intro strong { color: #4A3A00; }
  .stack-rows {
    display: grid; gap: 8px;
  }
  .stack-row {
    background: rgba(255,255,255,0.7);
    border: 1px solid #E6CD66;
    border-radius: 10px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 14px;
    align-items: center;
    font-size: 14px;
  }
  @media (max-width: 760px) {
    .stack-row { grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 12px; }
    .stack-row .stack-label { grid-column: 1 / -1; font-size: 13px; }
  }
  .stack-row .stack-label {
    font-weight: 600; color: #4A3A00;
  }
  .stack-row .stack-cell { font-variant-numeric: tabular-nums; }
  .stack-row .stack-cell .stack-cell-label {
    display: block; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: #8A7300; margin-bottom: 2px;
  }
  .stack-row .stack-cell.list .stack-cell-value { color: var(--muted); text-decoration: line-through; }
  .stack-row .stack-cell.yours .stack-cell-value { font-weight: 700; color: var(--flipdish-blue-dark); }
  .stack-row .stack-cell.save .stack-cell-value { font-weight: 700; color: var(--green-strong); }
  .stack-total {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #E6CD66;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 14px;
  }
  .stack-total-label { font-weight: 600; color: #4A3A00; }
  .stack-total-value {
    font-family: 'Domine', Georgia, serif;
    font-size: 22px; font-weight: 700; color: var(--green-strong);
  }

  /* ---------- New-revenue panel (Phone AI) ---------- */
  .new-rev {
    background: var(--flipdish-blue-light);
    border: 1px solid var(--flipdish-blue-line);
    border-radius: 12px; padding: 20px 22px;
    margin-bottom: 18px;
  }
  .new-rev h4 {
    font-family: 'Domine', Georgia, serif;
    font-size: 15px; font-weight: 600;
    color: var(--flipdish-blue-dark);
    margin: 0 0 6px;
  }
  .new-rev .big {
    font-family: 'Domine', Georgia, serif;
    font-size: 26px; font-weight: 700;
    color: var(--flipdish-blue-dark); margin: 8px 0 4px;
  }
  .new-rev .desc { font-size: 13px; color: var(--flipdish-blue-dark); opacity: 0.85; margin: 0 0 10px; }
  .new-rev .explain {
    font-size: 12px; color: var(--flipdish-blue-dark); opacity: 0.75;
    line-height: 1.5;
  }

  /* ---------- Investment block ---------- */
  .invest {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 22px 24px; margin-bottom: 18px;
  }
  .invest-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-size: 14px;
    border-bottom: 1px dashed var(--border);
  }
  .invest-row:last-of-type { border-bottom: 0; }
  .invest-row .k { color: var(--muted); }
  .invest-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ---------- Bottom line ---------- */
  .bottom-line {
    background: var(--flipdish-blue-dark);
    color: #fff;
    border-radius: 16px;
    padding: 28px 32px;
    margin: 28px 0 20px;
  }
  .bottom-line .bl-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.85;
  }
  .bottom-line .bl-big {
    font-family: 'Domine', Georgia, serif;
    font-size: 36px; font-weight: 700; margin: 6px 0 8px;
    letter-spacing: -0.01em;
  }
  .bottom-line .bl-sub { font-size: 14px; opacity: 0.9; }

  /* ---------- Notes / fine print ---------- */
  .fineprint {
    font-size: 12px; color: var(--muted);
    line-height: 1.6;
    margin: 18px 0 0;
  }

  /* ---------- Actions ---------- */
  .action-row {
    display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
    margin: 24px 0 10px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; font: inherit; font-size: 14px; font-weight: 500;
    color: var(--flipdish-dark);
    transition: all .15s ease;
  }
  .btn:hover { border-color: var(--flipdish-blue); color: var(--flipdish-blue); }
  .btn-primary {
    background: var(--flipdish-blue-dark); border-color: var(--flipdish-blue-dark); color: white;
  }
  .btn-primary:hover { background: var(--flipdish-blue); border-color: var(--flipdish-blue); color: white; }
  .btn svg { width: 15px; height: 15px; }

  /* ---------- Empty / error state ---------- */
  .empty {
    background: var(--amber-soft); border: 1px solid var(--amber-border);
    border-radius: 12px; padding: 24px;
    color: #6B5500; font-size: 14px;
  }
  .empty a { color: var(--amber-strong); }

  footer {
    margin-top: 28px; font-size: 12px; color: var(--muted); text-align: center;
    padding-top: 20px; border-top: 1px solid var(--border);
  }

  /* ---------- Print ---------- */
  @media print {
    body { background: white; }
    .topbar { border-bottom: 1px solid #000; padding: 10px 20px; }
    .action-row, .back-link { display: none !important; }
    .wrap { padding: 12px 16px; max-width: none; }
    .hero, .compare, .new-rev, .invest, .bottom-line {
      break-inside: avoid; page-break-inside: avoid;
    }
    .bottom-line { background: #eef; color: #000; }
    .bottom-line .bl-label { color: #000; }
  }
</style>
</head>

      </g>

  </div>
  <div class="date-stamp" id="dateStamp">—</div>
</div>

<div class="wrap">

  <!-- Main render area -->
  <div id="mainContent"></div>

  <!-- Empty-state placeholder (shown when no prospect matches ?id=...) -->
  <div class="empty" id="emptyState" style="display:none;">
    <strong>We couldn't load this deal.</strong>
    <p style="margin: 6px 0 0;">This cost justification is generated from a saved deal in the Deal Room. If you got here by accident, please go back and open it from there.</p>
    <p style="margin: 12px 0 0;"><a href="./">← Back to all deals</a></p>
  </div>

</div>

<footer>Flipdish · Cost justification · v1.0</footer>

<script>
  // ====================================================================
  // customer.html — external cost-justification view.
  // Reads the prospect from localStorage via ?id=..., renders a
  // customer-friendly summary of the value story. No inputs, no edits.
  // ====================================================================

  var STORAGE_KEY = 'flipdishProspects';
  var CCY  = { UK: '£', IE: '€', US: '$', ES: '€' };
  var LOC  = { UK: 'United Kingdom', IE: 'Ireland', US: 'United States', ES: 'Spain' };

  // Mirror of LIST_RATES in detail.html — used here to compute the
  // "list price → your price" discount-stack section. If detail.html's
  // LIST_RATES changes, mirror it here too.
  var LIST_RATES = {
    UK: {
      oo:    { sub: 99, processing: 0.05 },
      pos:   { sub: 99, processing: 0.012, txnFee: 0.10, hardwareStarter: 799 },
      kiosk: { sub: 79, hardware: 1500 }
    },
    IE: {
      oo:    { sub: 99, processing: 0.05 },
      pos:   { sub: 99, processing: 0.012, txnFee: 0.10, hardwareStarter: 899 },
      kiosk: { sub: 79, hardware: 1500 }
    },
    US: {
      oo:    { sub: 249, processing: 0.05 },
      pos:   null,
      kiosk: { sub: 79, hardware: 2500 }
    },
    ES: {
      oo:    { sub: 99, processing: 0.05 },
      pos:   null,
      kiosk: { sub: 79, hardware: 1500 }
    }
  };

  // ---------- URL + storage ----------
  function getQueryParam(key) {
    var q = window.location.search.replace(/^\?/, '').split('&');
    for (var i = 0; i < q.length; i++) {
      var pair = q[i].split('=');
      if (decodeURIComponent(pair[0]) === key) return decodeURIComponent(pair[1] || '');
    }
    return null;
  }
  function loadAll() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  }

  // ---------- HTML escape ----------
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ---------- Money formatter ----------
  function fmtMoney(n, country) {
    if (!isFinite(n)) return '—';
    var sym = CCY[country] || '£';
    var s = n < 0 ? '-' : '';
    return s + sym + Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  // ---------- Calculation (mirrors detail.html so both pages stay in sync) ----------
  function computeValueStory(p) {
    var result = {
      ooSavings: 0, posSavings: 0,
      fdMonthlySub: 0, hardwareOneOff: 0, contractMonths: 36,
      detail: {}
    };
    var c = p.current || {};
    var f = p.flipdish || {};
    var N = function (v) { var x = parseFloat(v); return isNaN(x) ? 0 : x; };

    if (p.includeOO) {
      var ooGmv = N(c.ooGmv);
      var ooAov = N(c.ooAov) > 0 ? N(c.ooAov) : N(c.aov);
      var ooTxn = ooAov > 0 ? (ooGmv / ooAov) : 0;
      var curOOSub      = N(c.ooSub);
      var curOOProcRate = N(c.ooProcessingRate) / 100;
      var curOOTransFee = N(c.ooTransFee);
      var curOOTotal    = (ooGmv * curOOProcRate) + (ooTxn * curOOTransFee) + curOOSub;
      var fdOOProcRate  = N(f.ooProcessingRate) / 100;
      var fdOOTotal     = ooGmv * fdOOProcRate;
      result.ooSavings = curOOTotal - fdOOTotal;
      result.detail.oo = {
        gmv: ooGmv,
        curSub: curOOSub, curProcPct: N(c.ooProcessingRate), curTransFee: curOOTransFee,
        fdProcPct: N(f.ooProcessingRate),
        curTotal: curOOTotal, fdTotal: fdOOTotal,
        provider: c.ooProvider || ''
      };
    }
    if (p.includePOS) {
      var posGmv = N(c.posGmv);
      var aov    = N(c.aov);
      var posTxn = aov > 0 ? (posGmv / aov) : 0;
      var curRate = N(c.posRate) / 100, newRate = N(f.posRate) / 100;
      var curTxnFee = N(c.posTransFee), newTxnFee = N(f.posTransFee);
      var curSub = N(c.posSub);
      var curPosCost = (posGmv * curRate) + (posTxn * curTxnFee) + curSub;
      var fdPosCost  = (posGmv * newRate) + (posTxn * newTxnFee);
      result.posSavings = curPosCost - fdPosCost;
      result.detail.pos = {
        gmv: posGmv, txn: posTxn, aov: aov,
        curRate: N(c.posRate), newRate: N(f.posRate),
        curTxnFee: curTxnFee, newTxnFee: newTxnFee,
        curSub: curSub,
        curTotal: curPosCost, newTotal: fdPosCost,
        provider: c.posProvider || ''
      };
    }
    // Roll up per-product subs and hardware (schema 5+).
    var locations = Math.max(1, Math.round(parseFloat(p.locations)) || 1);
    var totalSub = 0;
    var totalHw  = 0;
    if (p.includeOO)    totalSub += N(f.ooSub);
    if (p.includePOS) {
      totalSub += N(f.posSub) * locations;
      totalHw  += N(f.posHardware);
    }
    if (p.includeKiosk) {
      totalSub += N(f.kioskSub);
      totalHw  += N(f.kioskHardware);
    }
    result.fdMonthlySub   = totalSub;
    result.hardwareOneOff = totalHw;
    result.contractMonths = 12;  // Flipdish standard 12-month contract

    result.netMonthly = result.ooSavings + result.posSavings - result.fdMonthlySub;

    result.annualValue = (result.netMonthly * 12) - result.hardwareOneOff;
    result.contractValue = (result.netMonthly * result.contractMonths) - result.hardwareOneOff;

    // Payback: how many months until cumulative net value covers the hardware one-off
    if (result.netMonthly > 0 && result.hardwareOneOff > 0) {
      result.paybackMonths = result.hardwareOneOff / result.netMonthly;
    } else if (result.netMonthly > 0) {
      result.paybackMonths = 0;  // no one-off to recover
    } else {
      result.paybackMonths = null;
    }
    return result;
  }

  // ---------- Render helpers ----------
  function saveCallout(amount, country) {
    if (amount > 0) {
      return '<span class="save-callout">You save ' + fmtMoney(amount, country) + '/mo</span>';
    } else if (amount < 0) {
      return '<span class="save-callout negative">+' + fmtMoney(-amount, country) + '/mo vs today</span>';
    }
    return '<span class="save-callout zero">Same as today</span>';
  }

  function ooCompareHtml(v, country) {
    var d = v.detail.oo;
    if (!d || d.gmv <= 0) return '';
    var providerLabel = d.provider ? escapeHtml(d.provider) : 'Your current direct ordering provider';
    return '' +
      '<div class="compare">' +
        '<div class="compare-title">Direct online ordering</div>' +
        '<div class="row"><span class="k">Monthly online revenue</span><span class="v">' + fmtMoney(d.gmv, country) + '</span></div>' +
        '<div class="row"><span class="k">' + providerLabel + ' — all-in monthly</span><span class="v">-' + fmtMoney(d.curTotal, country) + '</span></div>' +
        '<div class="row"><span class="k">Flipdish — all-in monthly</span><span class="v">-' + fmtMoney(d.fdTotal, country) + '</span></div>' +
        '<div class="total-row"><span>Monthly saving</span><span class="v">' + fmtMoney(v.ooSavings, country) + '</span></div>' +
        saveCallout(v.ooSavings, country) +
      '</div>';
  }

  function posCompareHtml(v, country) {
    var d = v.detail.pos;
    if (!d || d.gmv <= 0) return '';
    var providerLabel = d.provider ? escapeHtml(d.provider) : 'Your current POS';
    return '' +
      '<div class="compare">' +
        '<div class="compare-title">POS &amp; in-store</div>' +
        '<div class="row"><span class="k">Monthly in-store revenue</span><span class="v">' + fmtMoney(d.gmv, country) + '</span></div>' +
        '<div class="row"><span class="k">' + providerLabel + ' — all-in monthly</span><span class="v">-' + fmtMoney(d.curTotal, country) + '</span></div>' +
        '<div class="row"><span class="k">Flipdish — all-in monthly</span><span class="v">-' + fmtMoney(d.newTotal, country) + '</span></div>' +
        '<div class="total-row"><span>Monthly saving</span><span class="v">' + fmtMoney(v.posSavings, country) + '</span></div>' +
        saveCallout(v.posSavings, country) +
      '</div>';
  }

  // ---------- Discount stack (the hype) ----------
  // For each lever the customer is buying, show "list price → your price"
  // with the saving in £ and as a % off list. This reframes the deal as
  // "look at what we're giving you" rather than "look at what it costs".
  function discountStackHtml(p, country) {
    var rates = LIST_RATES[country] || LIST_RATES.UK;
    var f = p.flipdish || {};
    var locations = Math.max(1, Math.round(parseFloat(p.locations)) || 1);
    var rows = [];
    var totalListMonthly = 0;
    var totalYouMonthly = 0;
    var totalListOneOff = 0;
    var totalYouOneOff = 0;
    var N = function (v) { var x = parseFloat(v); return isNaN(x) ? 0 : x; };

    function pct(list, you) {
      if (list <= 0) return 0;
      return Math.round((list - you) / list * 100);
    }
    function rowHtml(label, listText, youText, saveText, savePct) {
      return '' +
        '<div class="stack-row">' +
          '<div class="stack-label">' + escapeHtml(label) + '</div>' +
          '<div class="stack-cell list"><span class="stack-cell-label">List price</span><span class="stack-cell-value">' + listText + '</span></div>' +
          '<div class="stack-cell yours"><span class="stack-cell-label">Your price</span><span class="stack-cell-value">' + youText + '</span></div>' +
          '<div class="stack-cell save"><span class="stack-cell-label">You save</span><span class="stack-cell-value">' + saveText + (savePct != null ? ' &nbsp;<small>(' + savePct + '% off)</small>' : '') + '</span></div>' +
        '</div>';
    }

    // ---- OO processing ----
    if (p.includeOO && rates.oo) {
      var ooListPct = rates.oo.processing * 100;
      var ooYouPct = N(f.ooProcessingRate);
      if (ooYouPct < ooListPct) {
        rows.push(rowHtml(
          'Online ordering — processing %',
          ooListPct + '%',
          ooYouPct + '%',
          (ooListPct - ooYouPct).toFixed(1) + 'pp',
          pct(ooListPct, ooYouPct)
        ));
      }
    }

    // ---- POS processing rate ----
    if (p.includePOS && rates.pos) {
      var posListPct = rates.pos.processing * 100;
      var posYouPct = N(f.posRate);
      if (posYouPct > 0 && posYouPct < posListPct) {
        rows.push(rowHtml(
          'POS — processing rate',
          posListPct + '%',
          posYouPct + '%',
          (posListPct - posYouPct).toFixed(2) + 'pp',
          pct(posListPct, posYouPct)
        ));
      }
      // ---- POS per-txn fee ----
      var posListTxn = rates.pos.txnFee;
      var posYouTxn = N(f.posTransFee);
      if (posYouTxn > 0 && posYouTxn < posListTxn) {
        rows.push(rowHtml(
          'POS — per-transaction fee',
          fmtMoney(posListTxn, country),
          fmtMoney(posYouTxn, country),
          fmtMoney(posListTxn - posYouTxn, country),
          pct(posListTxn, posYouTxn)
        ));
      }
    }

    // ---- Bundle subscription (rolled up from per-product subs in v5+) ----
    var listSubMonthly = 0;
    var youSubMonthly = 0;
    if (p.includeOO && rates.oo) {
      listSubMonthly += rates.oo.sub;
      youSubMonthly  += N(f.ooSub);
    }
    if (p.includePOS && rates.pos) {
      listSubMonthly += rates.pos.sub * locations;
      youSubMonthly  += N(f.posSub) * locations;
    }
    if (p.includeKiosk && rates.kiosk) {
      // Kiosk uses totals directly; we don't know list sub for the
      // customer's deal because count isn't tracked. Use the user's
      // value as both list and yours (no compare row will render).
      var kioskSubYou = N(f.kioskSub);
      listSubMonthly += kioskSubYou;
      youSubMonthly  += kioskSubYou;
    }
    if (listSubMonthly > 0 && youSubMonthly > 0) {
      totalListMonthly += listSubMonthly;
      totalYouMonthly  += youSubMonthly;
      if (youSubMonthly < listSubMonthly) {
        rows.push(rowHtml(
          'Total monthly subscription',
          fmtMoney(listSubMonthly, country) + '/mo',
          fmtMoney(youSubMonthly, country) + '/mo',
          fmtMoney(listSubMonthly - youSubMonthly, country) + '/mo',
          pct(listSubMonthly, youSubMonthly)
        ));
      } else {
        rows.push(rowHtml(
          'Total monthly subscription',
          fmtMoney(listSubMonthly, country) + '/mo',
          fmtMoney(youSubMonthly, country) + '/mo',
          'kept at list',
          null
        ));
      }
    }

    // ---- Hardware (one-off) — sum per-product values ----
    var listHardware = 0;
    var youHardware = 0;
    if (p.includePOS && rates.pos) {
      listHardware += rates.pos.hardwareStarter * locations;
      youHardware  += N(f.posHardware);
    }
    if (p.includeKiosk && rates.kiosk) {
      // Kiosk uses totals directly. We don't know how many kiosks were
      // priced, so we can't synthesise a per-unit list comparison.
      // Show the user-entered total as both list and yours so the row
      // appears with no discount unless the rep adjusted it manually.
      var kioskHwYou = N(f.kioskHardware);
      listHardware += kioskHwYou;
      youHardware  += kioskHwYou;
    }
    if (listHardware > 0 && youHardware >= 0) {
      totalListOneOff += listHardware;
      totalYouOneOff  += youHardware;
      if (youHardware < listHardware) {
        rows.push(rowHtml(
          'Hardware (one-off)',
          fmtMoney(listHardware, country),
          fmtMoney(youHardware, country),
          fmtMoney(listHardware - youHardware, country),
          pct(listHardware, youHardware)
        ));
      }
    }

    if (rows.length === 0) return '';

    // Total saving across the package over Year 1
    var totalSaveMonthly = totalListMonthly - totalYouMonthly;
    var totalSaveOneOff  = totalListOneOff - totalYouOneOff;
    var totalSaveYearOne = (totalSaveMonthly * 12) + totalSaveOneOff;

    var totalLine = '';
    if (totalSaveYearOne > 0) {
      totalLine = '' +
        '<div class="stack-total">' +
          '<span class="stack-total-label">Total package value vs list (Year 1)</span>' +
          '<span class="stack-total-value">' + fmtMoney(totalSaveYearOne, country) + ' off</span>' +
        '</div>';
    }

    return '' +
      '<div class="discount-stack">' +
        '<p class="discount-stack-intro"><strong>Your special pricing.</strong> Below is the discount we\'re putting on the table for your business — comparing standard list pricing to what you\'ll actually be paying.</p>' +
        '<div class="stack-rows">' + rows.join('') + '</div>' +
        totalLine +
      '</div>';
  }

  function investmentHtml(v, country) {
    var rows = [];
    if (v.fdMonthlySub > 0) rows.push({ k: 'Flipdish monthly subscription', v: fmtMoney(v.fdMonthlySub, country) + '/mo' });
    if (v.hardwareOneOff > 0) rows.push({ k: 'Hardware (one-off, net of any subsidy)', v: fmtMoney(v.hardwareOneOff, country) });
    if (!rows.length) return '';
    return '<div class="invest">' +
      rows.map(function (r) {
        return '<div class="invest-row"><span class="k">' + r.k + '</span><span class="v">' + r.v + '</span></div>';
      }).join('') +
    '</div>';
  }

  function paybackLine(v, country) {
    if (v.paybackMonths == null) {
      return 'On these numbers the monthly figures don\'t yet show a positive return. Ask your Flipdish rep to review the rates.';
    }
    if (v.paybackMonths === 0) {
      return 'No hardware one-off to recover — you\'re net-positive from day one.';
    }
    if (v.paybackMonths <= 12) {
      var whole = Math.round(v.paybackMonths);
      return 'The ' + fmtMoney(v.hardwareOneOff, country) + ' hardware investment pays back in roughly <strong>' + whole + ' month' + (whole === 1 ? '' : 's') + '</strong> — after that, the full monthly saving is yours.';
    }
    var yrs = (v.paybackMonths / 12).toFixed(1);
    return 'The ' + fmtMoney(v.hardwareOneOff, country) + ' hardware investment pays back in about <strong>' + yrs + ' years</strong> on these numbers.';
  }

  // ---------- Main render ----------
  function render() {
    var id = getQueryParam('id');
    var list = loadAll();
    var prospect = id ? list.find(function (p) { return p.id === id; }) : null;

    // Always date-stamp the top right
    var today = new Date();
    document.getElementById('dateStamp').textContent =
      today.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });

    if (!prospect) {
      document.getElementById('emptyState').style.display = '';
      return;
    }

    var country = prospect.country || 'UK';
    var v = computeValueStory(prospect);

    var hasAnything = prospect.includeOO || prospect.includePOS;

    // Build the header
    var headerHtml = '' +
      '<div class="doc-header">' +
        '<div class="doc-kicker">Cost justification</div>' +
        '<h1 class="doc-title">' + escapeHtml(prospect.name || 'Your business') + '</h1>' +
        '<p class="doc-subtitle">Here\'s what moving to Flipdish looks like for your business, month on month.</p>' +
        '<div class="doc-meta">' +
          (prospect.locations ? '<span class="meta-item"><strong>' + prospect.locations + '</strong> ' + (prospect.locations == 1 ? 'location' : 'locations') + '</span>' : '') +
          '<span class="meta-item"><strong>' + LOC[country] + '</strong></span>' +
          (prospect.contactName ? '<span class="meta-item">Prepared for <strong>' + escapeHtml(prospect.contactName) + '</strong></span>' : '') +
          (prospect.ownerName ? '<span class="meta-item">Your Flipdish rep: <strong>' + escapeHtml(prospect.ownerName) + '</strong></span>' : '') +
        '</div>' +
      '</div>';

    if (!hasAnything) {
      document.getElementById('mainContent').innerHTML = headerHtml +
        '<div class="empty"><strong>No levers selected yet.</strong><p style="margin:6px 0 0;">This deal hasn\'t had Online Ordering or POS switched on in the Deal Room yet, so there\'s nothing to show here.</p></div>';
      return;
    }

    // Hero
    var heroClass = (v.netMonthly > 0) ? 'hero' : 'hero no-value';
    var monthlyLabel = v.netMonthly >= 0 ? 'What you save / month' : 'Net monthly delta';
    var heroHtml = '' +
      '<div class="' + heroClass + '">' +
        '<div class="cell">' +
          '<div class="label">' + monthlyLabel + '</div>' +
          '<div class="big">' + fmtMoney(v.netMonthly, country) + '</div>' +
          '<div class="sub">After the Flipdish monthly subscription</div>' +
        '</div>' +
        '<div class="cell">' +
          '<div class="label">Year 1 value</div>' +
          '<div class="big">' + fmtMoney(v.annualValue, country) + '</div>' +
          '<div class="sub">12 months, net of hardware one-off</div>' +
        '</div>' +
        '<div class="cell">' +
          '<div class="label">Over the ' + v.contractMonths + '-month contract</div>' +
          '<div class="big">' + fmtMoney(v.contractValue, country) + '</div>' +
          '<div class="sub">Total value across the term</div>' +
        '</div>' +
      '</div>';

    // Discount stack (the hype: list price → your price, per lever)
    var stackHtml = discountStackHtml(prospect, country);
    var stackSection = stackHtml
      ? '<h2 class="section-title"><span class="dot"></span>Your special pricing</h2>' + stackHtml
      : '';

    // Savings section (OO + POS)
    var savingsHtml = '';
    var savingsTiles = [];
    if (prospect.includeOO) {
      var ooTile = ooCompareHtml(v, country);
      if (ooTile) savingsTiles.push(ooTile);
    }
    if (prospect.includePOS) {
      var posTile = posCompareHtml(v, country);
      if (posTile) savingsTiles.push(posTile);
    }
    if (savingsTiles.length) {
      savingsHtml = '<h2 class="section-title"><span class="dot"></span>Where the savings come from</h2>' +
        '<div class="compare-grid">' + savingsTiles.join('') + '</div>';
    }

    // Investment
    var investHtml = investmentHtml(v, country);
    var investSectionHtml = investHtml
      ? '<h2 class="section-title"><span class="dot"></span>What it costs</h2>' + investHtml
      : '';

    // Bottom line + payback
    var blLabel = v.netMonthly > 0 ? 'Bottom line' : 'Where we stand today';
    var blBig = fmtMoney(v.netMonthly, country) + '/mo';
    var blSub = paybackLine(v, country);
    var bottomLineHtml = '' +
      '<div class="bottom-line">' +
        '<div class="bl-label">' + blLabel + '</div>' +
        '<div class="bl-big">' + blBig + '</div>' +
        '<div class="bl-sub">' + blSub + '</div>' +
      '</div>';

    // Fine-print footnote
    var finePrint = '<p class="fineprint">Figures above are based on what you and your Flipdish rep captured about your current setup and the rates in our proposal. Final quote values, contract terms and payment schedules are in the signed order form from Salesforce; this page is a summary for discussion.</p>';

    // Actions (not shown when printing)
    var actionsHtml = '' +
      '<div class="action-row">' +
        '<button class="btn btn-primary" id="printBtn" type="button">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>' +
          'Print / save as PDF' +
        '</button>' +
      '</div>';

    document.getElementById('mainContent').innerHTML =
      headerHtml + heroHtml + stackSection + savingsHtml + investSectionHtml + bottomLineHtml + finePrint + actionsHtml;

    var printBtn = document.getElementById('printBtn');
    if (printBtn) printBtn.addEventListener('click', function () { window.print(); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
</script>
</body>
</html>
